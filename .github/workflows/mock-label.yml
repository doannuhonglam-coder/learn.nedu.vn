name: Auto-label Mock Changes

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect mock / architecture changes
        id: detect
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '^(src/mocks/|architecture\.md$)' || echo "")

          if [ -n "$CHANGED" ]; then
            echo "should_label=true" >> $GITHUB_OUTPUT
            echo "⚠️  Mock / architecture changes detected:"
            echo "$CHANGED"
          else
            echo "should_label=false" >> $GITHUB_OUTPUT
            echo "✅ No mock / architecture changes."
          fi

      - name: Add mock-changed label
        if: steps.detect.outputs.should_label == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['mock-changed'],
            })
